# Render Blueprint — provisions the web service + managed Postgres described
# in README.md.
# https://render.com/docs/blueprint-spec

databases:
  - name: statworkforce-db
    plan: free
    databaseName: statworkforce
    user: statworkforce

services:
  - type: web
    name: statworkforce
    runtime: node
    plan: free
    # Runs the migration on every deploy, so schema changes ship automatically
    # on push instead of needing a manual `prisma migrate deploy` each time.
    buildCommand: npm install && npm run db:generate && npm run db:migrate:deploy && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: statworkforce-db
          property: connectionString
      - key: SESSION_SECRET
        sync: false
      # Deliberately NOT setting NODE_ENV here: Render sets it to "production"
      # for the running service automatically, but declaring it as an envVar
      # also applies it during the build phase, which makes `npm install`
      # skip devDependencies (tailwindcss, @tailwindcss/postcss, typescript)
      # that `next build` needs. Learned this the hard way on the first deploy.
