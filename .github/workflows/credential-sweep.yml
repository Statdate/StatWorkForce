name: Credential expiry sweep

# Render's free tier has no built-in scheduler, so this scheduled workflow is
# the "daily cron" — it just calls the app's own sweep endpoint. Needs a repo
# secret CRON_SECRET matching the Render env var of the same name.
on:
  schedule:
    - cron: "0 13 * * *" # 13:00 UTC daily (9am ET / 6am PT)
  workflow_dispatch: {}

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger credential expiry sweep
        run: |
          status=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "https://statworkforce.onrender.com/api/cron/credential-sweep" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          cat /tmp/response.json
          if [ "$status" -ge 300 ]; then
            echo "Sweep endpoint returned HTTP $status"
            exit 1
          fi
